<header class="header">
  <div class="categories-logo">
    <button class="categories-btn" (click)="onToggleSidebar()">
      <fa-icon [icon]="faBars"></fa-icon> Κατηγορίες
    </button>
    <a routerLink="/">All For Home</a>
  </div>

  <div class="search-bar">
    <input
      type="text"
      placeholder="Αναζήτηση"
      [(ngModel)]="searchInput"
      (keyup.enter)="onSearch()"
    />
    <button (click)="onSearch()">
      <fa-icon [icon]="faSearch"></fa-icon>
    </button>
  </div>

  <div class="header-actions">
    <a routerLink="/favorites" class="favorites">
      <span>
        <fa-icon [icon]="faHeart"></fa-icon> Αγαπημένα (0)
      </span>
    </a>
  </div>
</header>

<header class="header">
  <div class="logo">
    <a routerLink="/">All For Home</a>
  </div>

  <div class="search-bar">
    <input
      type="text"
      placeholder="Αναζήτηση"
      [(ngModel)]="searchQuery"
      (keyup.enter)="onSearch()"
    />
    <button (click)="onSearch()"><fa-icon [icon]="faSearch"></fa-icon>
</button>
  </div>

  <div class="header-actions">
    <a routerLink="/favorites" class="favorites"><span><fa-icon [icon]="faHeart"></fa-icon>  Αγαπημένα (0)</span></a>
  </div>
</header>

name: Deploy Angular SSR to Windows Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    env:
      APP_NAME: "angular-ssr-store"
      DEPLOY_PATH: "C:\\apps\\AllForHome"
      PM2_APP_NAME: "all-for-home-ssr"
      PM2_PATH: "C:\\Users\\Administrator\\AppData\\Roaming\\npm\\pm2.cmd"
      PORT: "4000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check PM2 path
        shell: powershell
        run: |
          if (!(Test-Path $env:PM2_PATH)) {
            throw "PM2 was not found at $env:PM2_PATH"
          }

          Write-Host "PM2 found at: $env:PM2_PATH"
          & $env:PM2_PATH -v

      - name: Install dependencies
        run: npm ci

      - name: Copy production environment file
        shell: powershell
        run: |
          $source = "C:\conf\AllforHome\environment.ts"
          $targetFolder = "src\app\env"
          $target = "$targetFolder\environment.ts"

          if (!(Test-Path $source)) {
            throw "Production environment file not found at $source"
          }

          New-Item -ItemType Directory -Force -Path $targetFolder
          Copy-Item $source $target -Force

          Write-Host "Environment file copied to $target"

      - name: Build Angular SSR
        run: npm run build -- --configuration production --base-href /AllForHome/

      - name: Verify build output
        shell: powershell
        run: |
          $buildPath = "dist\$env:APP_NAME"

          if (!(Test-Path $buildPath)) {
            Write-Host "Dist folder contents:"
            Get-ChildItem "dist" -Recurse | Select-Object FullName
            throw "Build output not found at $buildPath"
          }

          if (!(Test-Path "$buildPath\server")) {
            throw "SSR server folder not found at $buildPath\server"
          }

          if (!(Test-Path "$buildPath\browser")) {
            throw "Browser folder not found at $buildPath\browser"
          }

          Write-Host "Build output verified at $buildPath"

      - name: Prepare deploy folder
        shell: powershell
        run: |
          if (!(Test-Path $env:DEPLOY_PATH)) {
            New-Item -ItemType Directory -Path $env:DEPLOY_PATH -Force
          }

          Get-ChildItem $env:DEPLOY_PATH -Force | Remove-Item -Recurse -Force

          Write-Host "Deploy folder prepared: $env:DEPLOY_PATH"

      - name: Copy build output
        shell: powershell
        run: |
          $buildPath = "dist\$env:APP_NAME"

          Copy-Item "$buildPath\*" $env:DEPLOY_PATH -Recurse -Force
          Copy-Item "package.json" $env:DEPLOY_PATH -Force
          Copy-Item "package-lock.json" $env:DEPLOY_PATH -Force

          Write-Host "Build files copied to $env:DEPLOY_PATH"

      - name: Create PM2 ecosystem file
        shell: powershell
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          @"
          module.exports = {
            apps: [
              {
                name: "all-for-home-ssr",
                cwd: "C:\\apps\\AllForHome",
                script: ".\\server\\server.mjs",
                env: {
                  NODE_ENV: "production",
                  PORT: 4000
                }
              }
            ]
          };
          "@ | Out-File -FilePath "ecosystem.config.js" -Encoding UTF8

          Write-Host "PM2 ecosystem file created."

      - name: Install production dependencies
        shell: powershell
        working-directory: ${{ env.DEPLOY_PATH }}
        run: npm ci --omit=dev

      - name: Restart Angular SSR with PM2
        shell: powershell
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          & $env:PM2_PATH describe $env:PM2_APP_NAME

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Deleting existing PM2 process..."
            & $env:PM2_PATH delete $env:PM2_APP_NAME

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to delete existing PM2 process."
            }
          } else {
            Write-Host "PM2 process was not registered yet."
          }

          Write-Host "Starting Angular SSR with PM2..."
          & $env:PM2_PATH start ecosystem.config.js

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to start Angular SSR with PM2."
          }

          Write-Host "Saving PM2 process list..."
          & $env:PM2_PATH save

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to save PM2 process list."
          }

          Write-Host "Angular SSR restarted successfully."
